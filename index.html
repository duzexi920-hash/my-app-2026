<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Search - Modern Dark</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <h1 id="logo">Movie<span>Search</span></h1>
            <form id="search-form">
                <input type="text" id="search-input" placeholder="映画を検索..." autocomplete="off">
                <button type="submit">検索</button>
            </form>
        </div>
    </header>

    <main class="container">
        <h2 id="section-title">トレンド映画</h2>
        <div id="movie-grid" class="movie-grid">
            <!-- 映画カードがここに動的に追加されます -->
            <div class="loader">読み込み中...</div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Movie Search App. Data provided by <a href="https://www.themoviedb.org/" target="_blank">TMDB</a>.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
