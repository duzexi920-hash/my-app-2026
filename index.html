<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Movie Journal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <h1 id="logo">Movie<span>Journal</span></h1>
        </div>
    </header>

    <main class="container">
        <section id="entry-section">
            <div class="card form-card">
                <h2>新しい記録を追加</h2>
                <form id="journal-form">
                    <div class="form-group">
                        <label for="movie-title">映画タイトル</label>
                        <input type="text" id="movie-title" placeholder="映画の名前を入力..." required>
                    </div>
                    <div class="form-group">
                        <label for="movie-poster">ポスター画像</label>
                        <input type="file" id="movie-poster" accept="image/*" required>
                        <div id="image-preview" class="image-preview">
                            <span>プレビュー画像がここに表示されます</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="movie-thoughts">感想・メモ</label>
                        <textarea id="movie-thoughts" rows="5" placeholder="映画を観た感想を自由に書いてください..." required></textarea>
                    </div>
                    <button type="submit" class="btn-primary">ジャーナルに保存</button>
                </form>
            </div>
        </section>

        <section id="journal-section">
            <h2 id="section-title">私の観影記録</h2>
            <div id="journal-list" class="journal-list">
                <!-- 記録がここに動的に追加されます -->
                <p class="empty-msg">まだ記録がありません。上のフォームから追加してください。</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 My Movie Journal App.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
